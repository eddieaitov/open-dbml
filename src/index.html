<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ui-db — DBML Editor</title>
  <!-- CodeMirror CSS -->
  <link rel="stylesheet" href="../node_modules/codemirror/lib/codemirror.css" />
  <link rel="stylesheet" href="../node_modules/codemirror/theme/dracula.css" />
  <!-- App styles -->
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <!-- ─── Toolbar ──────────────────────────────────────────────────────── -->
  <header id="toolbar">
    <div class="toolbar-left">
      <span class="app-title">ui-db</span>
      <span id="file-label" class="file-label">&mdash; New File</span>
    </div>
    <div class="toolbar-center">
      <label class="autosave-toggle" title="Auto-save on every change (desktop only)">
        <input type="checkbox" id="chk-autosave" checked />
        <span class="autosave-label">Autosave</span>
      </label>
    </div>
    <div class="toolbar-right">
      <button id="btn-new"    class="btn" title="New schema (⌘N)">📄 New</button>
      <button id="btn-recent" class="btn btn-recent" title="Open Recent">📂 Recent ▾</button>
      <div id="recent-dropdown" class="recent-dropdown hidden"></div>
      <button id="btn-open"   class="btn" title="Open (⌘O)">📂 Open</button>
      <button id="btn-save"   class="btn" title="Save (⌘S)">💾 Save</button>
      <button id="btn-saveas" class="btn" title="Save As (⇧⌘S)">💾 Save As…</button>
    </div>
  </header>

  <!-- ─── Main content ─────────────────────────────────────────────────── -->
  <div id="main">
    <!-- Editor panel -->
    <div id="editor-panel">
      <div class="panel-header">
        <span>DBML Editor</span>
        <span id="cursor-pos" class="cursor-pos">Ln 1, Col 1</span>
      </div>
      <div id="editor-container"></div>
      <div id="status-bar">
        <span id="parse-status" class="parse-ok">✓ Schema parsed</span>
      </div>
    </div>

    <!-- Resize handle -->
    <div id="resize-handle"></div>

    <!-- Schema viewer panel -->
    <div id="schema-panel">
      <div class="panel-header">
        <span>Schema Visualizer</span>
        <button id="btn-arrange" class="btn btn-sm" title="Auto-arrange tables">⟳ Arrange</button>
      </div>
      <div id="schema-canvas">
        <!-- Table cards and SVG connections go here -->
        <svg id="connections-svg" class="connections-svg"></svg>
        <div id="tables-container"></div>
        <div id="empty-schema-msg" class="empty-msg">
          <div class="empty-icon">🗄️</div>
          <div class="empty-text">Write DBML to see the schema</div>
        </div>
        <div id="zoom-indicator" class="zoom-indicator hidden">100%</div>
      </div>
    </div>
  </div>

  <!-- CodeMirror JS -->
  <script src="../node_modules/codemirror/lib/codemirror.js"></script>
  <script src="../node_modules/codemirror/mode/sql/sql.js"></script>
  <script src="../node_modules/codemirror/addon/selection/active-line.js"></script>
  <script src="../node_modules/codemirror/addon/edit/closebrackets.js"></script>
  <script src="../node_modules/codemirror/addon/edit/matchbrackets.js"></script>
  <script src="renderer.js"></script>
</body>
</html>
